name: Deploy MobiFone Chatbot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up SSH & Deploy
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_USERNAME,DB_PASSWORD,DB_DATABASE,DB_SYNCHRONIZE,JWT_SECRET,JWT_EXPIRES_IN,GEMINI_API_KEY,AI_PROVIDER,GEMINI_MODEL,OPENAI_API_KEY,EVAL_JUDGE_PROVIDER,EVAL_JUDGE_MODEL,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,SMTP_FROM,CORS_ALLOWED_ORIGINS,ADMIN_SEED_PASSWORD,SALES_SEED_PASSWORD,SUBSCRIBER_SEED_PASSWORD
          script: |
            # Clone nếu chưa có git repo, ngược lại pull code mới
            if [ ! -d "/opt/mobifone-chatbot-system/.git" ]; then
              rm -rf /opt/mobifone-chatbot-system
              git clone https://github.com/${{ github.repository }}.git /opt/mobifone-chatbot-system
            fi
            cd /opt/mobifone-chatbot-system
            git pull origin main

            # Tạo file .env từ secrets trên server
            printf '%s\n' \
              "DB_USERNAME=${DB_USERNAME}" \
              "DB_PASSWORD=${DB_PASSWORD}" \
              "DB_DATABASE=${DB_DATABASE}" \
              "DB_SYNCHRONIZE=${DB_SYNCHRONIZE}" \
              "JWT_SECRET=${JWT_SECRET}" \
              "JWT_EXPIRES_IN=${JWT_EXPIRES_IN}" \
              "GEMINI_API_KEY=${GEMINI_API_KEY}" \
              "AI_PROVIDER=${AI_PROVIDER}" \
              "GEMINI_MODEL=${GEMINI_MODEL}" \
              "OPENAI_API_KEY=${OPENAI_API_KEY}" \
              "EVAL_JUDGE_PROVIDER=${EVAL_JUDGE_PROVIDER}" \
              "EVAL_JUDGE_MODEL=${EVAL_JUDGE_MODEL}" \
              "SMTP_HOST=${SMTP_HOST}" \
              "SMTP_PORT=${SMTP_PORT}" \
              "SMTP_USER=${SMTP_USER}" \
              "SMTP_PASS=${SMTP_PASS}" \
              "SMTP_FROM=${SMTP_FROM}" \
              "CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}" \
              "ADMIN_SEED_PASSWORD=${ADMIN_SEED_PASSWORD}" \
              "SALES_SEED_PASSWORD=${SALES_SEED_PASSWORD}" \
              "SUBSCRIBER_SEED_PASSWORD=${SUBSCRIBER_SEED_PASSWORD}" \
              > .env

            # Dọn dẹp container cũ (kể cả container bị kẹt)
            docker compose down --remove-orphans 2>/dev/null || true
            docker rm -f mobifone_frontend mobifone_backend mobifone_ai_core mobifone_db 2>/dev/null || true

            # Khởi động lại hệ thống
            docker compose up -d --build
        env:
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_SYNCHRONIZE: ${{ secrets.DB_SYNCHRONIZE }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EVAL_JUDGE_PROVIDER: ${{ secrets.EVAL_JUDGE_PROVIDER }}
          EVAL_JUDGE_MODEL: ${{ secrets.EVAL_JUDGE_MODEL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          ADMIN_SEED_PASSWORD: ${{ secrets.ADMIN_SEED_PASSWORD }}
          SALES_SEED_PASSWORD: ${{ secrets.SALES_SEED_PASSWORD }}
          SUBSCRIBER_SEED_PASSWORD: ${{ secrets.SUBSCRIBER_SEED_PASSWORD }}
